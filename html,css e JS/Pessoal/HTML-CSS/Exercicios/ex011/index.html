<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Teste abrir esse site em vários dispositivos para testar</p>
    
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem flexível">
    </picture>

    <h1>Reproduzindo Áudio</h1>
    <p>Testando uma musica top</p>
    <audio preload="metadata" autoplay controls loop>
        
        <source src="midia/LostMyself-Lalanne.mp3" type="audio/mpeg">
        <source src="midia/LostMyself-Lalanne.ogg" type="audio/ogg">
        <source src="midia/LostMyself-Lalanne.wav" type="audio/wav">
        <p>Infelizmente seu navegador não suporta essa mídia <a href="midia/LostMyself-Lalanne.mp3"> Clique aqui para baixar</a></p>
    </audio>
</body>
</html>
